<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Jain Bhajan Karaoke</title>
<meta name="description" content="Browse, search, and sing along to Jain bhajans with time-synced karaoke lyrics." />
<meta name="theme-color" content="#0d0509" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23150a10'/%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='%23d4af37' stroke-width='2'/%3E%3Ctext x='32' y='41' font-family='Georgia, serif' font-size='26' text-anchor='middle' fill='%23d4af37'%3EJ%3C/text%3E%3C/svg%3E" />
<style>
:root{color-scheme:dark;--bg:#0a0508;--bg-elevated:#150a10;--bg-card:#1c0f16;--bg-card-hover:#24131c;--maroon:#3a0f1c;--gold:#d4af37;--gold-bright:#f5cd6b;--saffron:#ff9933;--deep-red:#b23a48;--deep-red-bright:#e0697a;--text:#f5ece1;--text-dim:#cbb9ab;--text-faint:#8f7d75;--border:rgba(212,175,55,.18);--border-strong:rgba(212,175,55,.4);--radius:14px;--radius-sm:8px;--shadow:0 12px 32px rgba(0,0,0,.45);--font-display:Georgia,'Iowan Old Style','Palatino Linotype',serif;--font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:radial-gradient(120% 100% at 50% -10%,var(--maroon) 0%,var(--bg) 45%) fixed,var(--bg);color:var(--text);font-family:var(--font-body);line-height:1.5;min-height:100vh;padding-bottom:96px}
h1,h2,h3{font-family:var(--font-display);font-weight:700;letter-spacing:.01em;color:var(--text);margin:0 0 .4em}
a{color:var(--gold-bright);text-decoration:none}
a:hover{text-decoration:underline}
p{color:var(--text-dim);margin:0 0 .6em}
img{max-width:100%;display:block}
button,input{font-family:inherit;color:inherit}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:4px}
.skip-link{position:absolute;left:-999px;top:0;background:var(--gold);color:#0a0508;padding:10px 16px;z-index:200;border-radius:0 0 8px 0}
.skip-link:focus{left:0}
.app-header{display:flex;align-items:center;gap:24px;padding:16px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(10,5,8,.88);backdrop-filter:blur(10px);z-index:100}
.app-header__brand{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-size:1.15rem;font-weight:700;color:var(--text);white-space:nowrap}
.app-header__brand:hover{text-decoration:none;color:var(--gold-bright)}
.app-header__mark{color:var(--gold);font-size:1.4rem}
.app-header__nav{display:flex;gap:20px;flex:1}
.app-header__nav a{color:var(--text-dim);font-weight:600;font-size:.95rem}
.app-header__nav a:hover{color:var(--gold-bright);text-decoration:none}
.view{max-width:1120px;margin:0 auto;padding:32px 24px 48px}
.app-footer{text-align:center;padding:24px;color:var(--text-faint);font-size:.85rem}
.section{margin-top:48px}
.section__header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
.section h2{font-size:1.4rem}
.link{font-weight:600;font-size:.9rem}
.loading,.empty-state{color:var(--text-faint);padding:32px;text-align:center;border:1px dashed var(--border);border-radius:var(--radius);grid-column:1/-1}
.hero{padding:56px 8px 24px;text-align:center}
.hero__eyebrow{text-transform:uppercase;letter-spacing:.18em;font-size:.75rem;color:var(--saffron);font-weight:700;margin-bottom:10px}
.hero h1{font-size:clamp(2rem,4.5vw,3.2rem);background:linear-gradient(120deg,var(--gold-bright),var(--saffron) 60%,var(--deep-red-bright));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:.3em}
.hero__sub{max-width:560px;margin:0 auto 28px;font-size:1.05rem}
.hero__search{display:flex;gap:10px;max-width:560px;margin:0 auto}
.hero__search input{flex:1;padding:14px 18px;border-radius:999px;border:1px solid var(--border-strong);background:var(--bg-card);color:var(--text);font-size:1rem}
.hero__search button{padding:14px 24px;border-radius:999px;border:none;background:linear-gradient(120deg,var(--gold),var(--saffron));color:#241009;font-weight:700;cursor:pointer}
.search-page h1{font-size:1.8rem}
.search-controls{display:flex;flex-direction:column;gap:14px;margin-bottom:6px}
#search-input{padding:13px 18px;border-radius:999px;border:1px solid var(--border-strong);background:var(--bg-card);color:var(--text);font-size:1rem;width:100%}
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1px solid var(--border);background:transparent;color:var(--text-dim);padding:7px 16px;border-radius:999px;font-weight:600;font-size:.85rem;cursor:pointer}
.chip:hover{border-color:var(--border-strong);color:var(--text)}
.chip--active{background:var(--deep-red);border-color:var(--deep-red-bright);color:var(--text)}
.search-count{font-size:.85rem;color:var(--text-faint);margin:14px 0}
.song-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px}
.song-card{display:block;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;color:var(--text);transition:transform .15s ease,border-color .15s ease,background .15s ease}
.song-card:hover{transform:translateY(-3px);border-color:var(--border-strong);background:var(--bg-card-hover);text-decoration:none}
.song-card__art{position:relative;aspect-ratio:1/1}
.song-card__art img{width:100%;height:100%;object-fit:cover}
.song-card__play{position:absolute;right:10px;bottom:10px;width:42px;height:42px;border-radius:50%;background:rgba(10,5,8,.75);color:var(--gold-bright);font-size:1rem;cursor:pointer;backdrop-filter:blur(4px);border:1px solid var(--border-strong)}
.song-card__play:hover{background:var(--deep-red)}
.song-card__meta{padding:14px 14px 16px}
.song-card__meta h3{font-size:1rem;margin-bottom:2px}
.song-card__meta p{font-size:.85rem;margin-bottom:8px}
.song-card__tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 9px;border-radius:999px;background:rgba(212,175,55,.14);color:var(--gold-bright);border:1px solid var(--border)}
.tag--muted{background:rgba(255,255,255,.05);color:var(--text-dim)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:999px;border:1px solid var(--border-strong);background:transparent;color:var(--text);font-weight:700;font-size:.95rem;cursor:pointer;transition:transform .1s ease,background .15s ease}
.btn:hover{text-decoration:none;transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn--primary{background:linear-gradient(120deg,var(--gold),var(--saffron));color:#241009;border:none}
.btn--accent{background:linear-gradient(120deg,var(--deep-red),var(--deep-red-bright));color:#fff;border:none}
.btn--ghost{background:rgba(255,255,255,.03)}
.icon-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);border-radius:50%;width:40px;height:40px;font-size:1.1rem;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.icon-btn:hover{border-color:var(--border-strong)}
.icon-btn--lg{width:54px;height:54px;font-size:1.4rem;background:linear-gradient(120deg,var(--gold),var(--saffron));color:#241009;border:none}
.song-detail{display:grid;grid-template-columns:280px 1fr;gap:32px;align-items:start}
.song-detail__art img{border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}
.song-detail__tags{display:flex;gap:8px;margin-bottom:12px}
.song-detail h1{font-size:clamp(1.6rem,3vw,2.4rem)}
.song-detail__artist{font-size:1.05rem}
.song-detail__actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px}
.lyrics-preview{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px;max-width:640px}
.lyrics-preview li{display:flex;gap:14px;color:var(--text-dim);border-bottom:1px solid var(--border);padding-bottom:10px}
.lyrics-preview__time{color:var(--text-faint);font-variant-numeric:tabular-nums;min-width:40px}
.mini-player{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:auto 1fr auto minmax(180px,320px) auto;align-items:center;gap:18px;padding:10px 20px;background:rgba(15,8,12,.96);border-top:1px solid var(--border-strong);backdrop-filter:blur(12px);z-index:150}
.mini-player__art img{width:48px;height:48px;border-radius:8px;object-fit:cover;border:1px solid var(--border)}
.mini-player__meta{min-width:0}
.mini-player__title{color:var(--text);font-weight:700;font-size:.9rem;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-player__artist{margin:0;font-size:.78rem;color:var(--text-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-player__controls{display:flex;align-items:center;gap:8px}
.mini-player__seek{display:flex;align-items:center;gap:8px;font-size:.72rem;color:var(--text-faint);font-variant-numeric:tabular-nums}
.mini-player__volume{display:flex;align-items:center;gap:6px}
input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:4px;border-radius:999px;background:rgba(255,255,255,.12);outline-offset:4px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold-bright);cursor:pointer;border:none}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--gold-bright);cursor:pointer;border:none}
.mini-player__volume input[type=range],.karaoke__volume input[type=range]{width:80px;flex:none}
body[data-route=karaoke] .app-header,body[data-route=karaoke] .app-footer,body[data-route=karaoke] .mini-player{display:none!important}
body[data-route=karaoke]{padding-bottom:0}
body[data-route=karaoke] .view{max-width:none;padding:0}
.karaoke{position:fixed;inset:0;display:flex;flex-direction:column;background:radial-gradient(120% 100% at 50% 0%,var(--maroon) 0%,var(--bg) 55%) fixed,var(--bg);z-index:300}
.karaoke--empty{align-items:center;justify-content:center;gap:16px;text-align:center;padding:24px}
.karaoke__topbar{display:flex;align-items:center;gap:16px;padding:18px 24px;flex-shrink:0}
.karaoke__titles h1{font-size:1.15rem;margin:0}
.karaoke__titles p{margin:0;font-size:.8rem}
.karaoke__lyrics{flex:1;overflow-y:auto;padding:10vh 8vw 30vh;scroll-behavior:smooth;-webkit-mask-image:linear-gradient(to bottom,transparent,#000 12%,#000 82%,transparent);mask-image:linear-gradient(to bottom,transparent,#000 12%,#000 82%,transparent)}
.karaoke__line{font-family:var(--font-display);font-size:clamp(1.3rem,3.6vw,2.4rem);font-weight:700;text-align:center;color:var(--text-faint);opacity:.45;margin:0 0 1.1em;transition:opacity .25s ease,color .25s ease,transform .25s ease;transform:scale(.94)}
.karaoke__line--upcoming{opacity:.55;transform:scale(.97)}
.karaoke__line--past{opacity:.28}
.karaoke__line--active{color:var(--gold-bright);opacity:1;transform:scale(1.06);text-shadow:0 0 24px rgba(212,175,55,.35)}
.karaoke__spacer{height:20vh}
.karaoke__dock{flex-shrink:0;padding:14px 24px 22px;background:linear-gradient(to top,rgba(10,5,8,.96),rgba(10,5,8,.4));border-top:1px solid var(--border)}
.karaoke__progress{display:flex;align-items:center;gap:12px;font-size:.78rem;color:var(--text-faint);font-variant-numeric:tabular-nums;margin-bottom:14px}
.karaoke__controls{display:flex;align-items:center;justify-content:center;gap:20px;position:relative}
.karaoke__volume{display:flex;align-items:center;gap:6px;position:absolute;right:24px}
@media (max-width:860px){.song-detail{grid-template-columns:1fr}.song-detail__art{max-width:240px}.mini-player{grid-template-columns:auto 1fr auto;grid-template-areas:'art meta controls' 'seek seek seek';row-gap:8px}.mini-player__art{grid-area:art}.mini-player__meta{grid-area:meta}.mini-player__controls{grid-area:controls}.mini-player__seek{grid-area:seek}.mini-player__volume{display:none}.karaoke__volume{display:none}}
@media (max-width:720px){.app-header__nav a:nth-child(n){font-size:.85rem}}
@media (max-width:480px){.view{padding:20px 16px 40px}.hero{padding:32px 0 16px}.hero__search{flex-direction:column}}
</style>
</head>

// ---------- utils ----------
function formatTime(seconds){
  if(!isFinite(seconds)||seconds<0) return '0:00';
  const m=Math.floor(seconds/60), s=Math.floor(seconds%60);
  return `${m}:${String(s).padStart(2,'0')}`;
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function emptyState(msg){ return `<div class="empty-state">${escapeHtml(msg)}</div>`; }
function songCardHtml(song){
  return `<a class="song-card" href="#/song/${song.id}" data-song-id="${song.id}">
    <div class="song-card__art">
      <img src="${song.cover}" alt="" loading="lazy" />
      <button class="song-card__play" data-play-song="${song.id}" aria-label="Play ${escapeHtml(song.title)}">▶</button>
    </div>
    <div class="song-card__meta">
      <h3>${escapeHtml(song.title)}</h3>
      <p>${escapeHtml(song.artist)}</p>
      <div class="song-card__tags">
        <span class="tag">${escapeHtml(song.themeTag)}</span>
        <span class="tag tag--muted">${escapeHtml(song.category)}</span>
      </div>
    </div>
  </a>`;
}
function findSong(id){ return SONGS.find(s=>s.id===id); }

// ---------- tiny pub/sub state ----------
const state = { currentSong:null, isPlaying:false };
const listeners = new Set();
function subscribe(fn){ listeners.add(fn); return ()=>listeners.delete(fn); }
function setState(patch){ Object.assign(state,patch); for(const fn of listeners) fn(state); }

// ---------- persistent player ----------
const audioEl = document.getElementById('audio-el');
const timeListeners = new Set();
audioEl.addEventListener('timeupdate', ()=>{ for(const fn of timeListeners) fn(audioEl.currentTime, audioEl.duration); });
audioEl.addEventListener('play', ()=>setState({isPlaying:true}));
audioEl.addEventListener('pause', ()=>setState({isPlaying:false}));
audioEl.addEventListener('ended', ()=>setState({isPlaying:false}));
const player = {
  onTimeUpdate(fn){ timeListeners.add(fn); return ()=>timeListeners.delete(fn); },
  loadSong(song,{autoplay=true}={}){
    const same = state.currentSong && state.currentSong.id===song.id;
    setState({currentSong:song});
    if(!same){ audioEl.src=song.audioUrl; audioEl.currentTime=0; }
    if(autoplay) audioEl.play().catch(()=>{});
  },
  toggleSongPlayback(song){
    const same = state.currentSong && state.currentSong.id===song.id;
    if(same && state.isPlaying) audioEl.pause();
    else this.loadSong(song,{autoplay:true});
  },
  play(){ return audioEl.play().catch(()=>{}); },
  pause(){ audioEl.pause(); },
  restart(){ audioEl.currentTime=0; if(audioEl.paused) audioEl.play().catch(()=>{}); },
  seek(s){ audioEl.currentTime=s; },
  setVolume(v){ audioEl.volume=Math.max(0,Math.min(1,v)); },
  getVolume(){ return audioEl.volume; },
  getCurrentTime(){ return audioEl.currentTime||0; },
  isPaused(){ return audioEl.paused; },
};

// ---------- router ----------
const routes = [];
function route(path, render){
  const keys=[];
  const pattern = new RegExp('^'+path.replace(/:[a-zA-Z]+/g,m=>{keys.push(m.slice(1));return '([^/]+)';}).replace(/\\//g,'\\/')+'$');
  routes.push({pattern,keys,render});
}
function currentPath(){
  const hash = location.hash.slice(1)||'/';
  const [pathPart, queryPart] = hash.split('?');
  return {pathPart: pathPart||'/', params: Object.fromEntries(new URLSearchParams(queryPart||''))};
}
let currentCleanup = null;
async function resolveRoute(){
  const container = document.getElementById('view');
  const {pathPart, params:queryParams} = currentPath();
  if(typeof currentCleanup==='function'){ try{currentCleanup();}catch{} currentCleanup=null; }
  for(const r of routes){
    const match = pathPart.match(r.pattern);
    if(match){
      const params={};
      r.keys.forEach((k,i)=>params[k]=decodeURIComponent(match[i+1]));
      Object.assign(params, queryParams);
      window.scrollTo({top:0});
      currentCleanup = await r.render(container, params);
      document.body.dataset.route = pathPart.split('/')[1]||'home';
      return;
    }
  }
  container.innerHTML = `<div class="empty-state">Page not found. <a href="#/">Go home</a></div>`;
}
function navigate(path){ location.hash = path; }
window.addEventListener('hashchange', resolveRoute);

const CATEGORIES = ['Aarti','Stavan','Navkar','Festival'];
function filterSongs(query, category){
  const q=query.trim().toLowerCase();
  return SONGS.filter(s=>{
    const matchesQuery = !q || s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q) || s.themeTag.toLowerCase().includes(q) || s.category.toLowerCase().includes(q);
    const matchesCategory = !category || s.category===category;
    return matchesQuery && matchesCategory;
  });
}
function renderSearch(container, params){
  const initialQuery = params.q||'';
  let activeCategory = params.category||'';
  container.innerHTML = `
    <section class="section search-page">
      <h1>Search bhajans</h1>
      <div class="search-controls">
        <input type="search" id="search-input" placeholder="Search by title, artist, or tag..." value="${initialQuery.replace(/"/g,'&quot;')}" aria-label="Search bhajans" />
        <div class="chip-row" id="category-chips" role="group" aria-label="Filter by category">
          ${CATEGORIES.map(c=>`<button type="button" class="chip${activeCategory===c?' chip--active':''}" data-category="${c}">${c}</button>`).join('')}
        </div>
      </div>
      <p class="search-count" id="search-count"></p>
      <div class="song-grid" id="search-results"></div>
    </section>`;
  const input=document.getElementById('search-input');
  const results=document.getElementById('search-results');
  const count=document.getElementById('search-count');
  const chips=document.querySelectorAll('#category-chips .chip');
  function renderResults(){
    const list=filterSongs(input.value, activeCategory);
    count.textContent = `${list.length} bhajan${list.length===1?'':'s'} found`;
    results.innerHTML = list.length? list.map(songCardHtml).join(''):emptyState('No bhajans match your search.');
    const qp=new URLSearchParams();
    if(input.value.trim()) qp.set('q', input.value.trim());
    if(activeCategory) qp.set('category', activeCategory);
    const q=qp.toString();
    history.replaceState(null,'',`#/search${q?'?'+q:''}`);
  }
  input.addEventListener('input', renderResults);
  chips.forEach(chip=>{
    chip.addEventListener('click',()=>{
      const cat=chip.dataset.category;
      activeCategory = activeCategory===cat? '':cat;
      chips.forEach(c=>c.classList.toggle('chip--active', c.dataset.category===activeCategory));
      renderResults();
    });
  });
  renderResults();
  input.focus({preventScroll:true});
}

function renderSongDetail(container, params){
  const song = findSong(params.id);
  if(!song){ container.innerHTML = emptyState('Song not found.'); return; }

  const isPlayingThis = ()=> isCurrent() && state.isPlaying;
  container.innerHTML = `
    <section class="song-detail">
      <div class="song-detail__art"><img src="${song.cover}" alt="" /></div>
      <div class="song-detail__info">

function renderKaraoke(container, params){
  const song = findSong(params.id);
  if(!song){ container.innerHTML = emptyState('Song not found.'); return; }
  if(!song.lyrics.length){
    container.innerHTML = `<div class="karaoke karaoke--empty">${emptyState('No synced lyrics exist for this bhajan yet, so Karaoke Mode is unavailable.')}<a class="btn btn--ghost" href="#/song/${song.id}">← Back to song</a></div>`;
    return;
  }
  const isCurrent = ()=> state.currentSong && state.currentSong.id===song.id;
  if(!isCurrent()) player.loadSong(song,{autoplay:true});
  else if(player.isPaused()) player.play();

  container.innerHTML = `
    <div class="karaoke">
      <div class="karaoke__topbar">
        <button class="icon-btn" id="karaoke-close" aria-label="Exit karaoke mode">✕</button>
        <div class="karaoke__titles"><h1>${escapeHtml(song.title)}</h1><p>${escapeHtml(song.artist)}</p></div>

      </div>
      <div class="karaoke__dock">
        <div class="karaoke__progress">
          <span class="karaoke__time" id="karaoke-current-time">0:00</span>
          <input type="range" id="karaoke-seek" min="0" max="${song.durationSeconds}" step="0.1" value="0" aria-label="Seek" />
          <span class="karaoke__time" id="karaoke-duration">${formatTime(song.durationSeconds)}</span>
        </div>
        <div class="karaoke__controls">
          <button class="icon-btn" id="karaoke-restart" aria-label="Restart">⟲</button>
          <button class="icon-btn icon-btn--lg" id="karaoke-playpause" aria-label="Play or pause">⏸</button>
          <label class="karaoke__volume">🔊<input type="range" id="karaoke-volume" min="0" max="1" step="0.01" value="${player.getVolume()}" aria-label="Volume" /></label>
        </div>
      </div>
    </div>`;
  const lines=Array.from(document.querySelectorAll('.karaoke__line'));
  const seek=document.getElementById('karaoke-seek');
  const volume=document.getElementById('karaoke-volume');
  const playPauseBtn=document.getElementById('karaoke-playpause');
  const currentTimeEl=document.getElementById('karaoke-current-time');
  const durationEl=document.getElementById('karaoke-duration');
  let lastIndex=-1, seeking=false;
  function highlight(t){
    let idx=-1;
    for(let i=0;i<lines.length;i++){ if(Number(lines[i].dataset.time)<=t) idx=i; else break; }
    if(idx!==lastIndex){
      if(lastIndex>=0 && lines[lastIndex]) lines[lastIndex].classList.remove('karaoke__line--active');
      if(idx>=0 && lines[idx]){ lines[idx].classList.add('karaoke__line--active'); lines[idx].scrollIntoView({block:'center',behavior:'smooth'}); }
      lines.forEach((line,i)=>{ line.classList.toggle('karaoke__line--past', i<idx); line.classList.toggle('karaoke__line--upcoming', i>idx); });
      lastIndex=idx;
    }
  }
  function updatePlayPauseBtn(){ playPauseBtn.textContent = state.isPlaying && isCurrent() ? '⏸':'▶'; }
  updatePlayPauseBtn();
  const unsubTime = player.onTimeUpdate((t,duration)=>{
    if(!seeking) seek.value=String(t);
    currentTimeEl.textContent = formatTime(t);
    if(isFinite(duration) && duration>0) durationEl.textContent = formatTime(duration);
    highlight(t);
  });
  const unsubState = subscribe(updatePlayPauseBtn);
  document.getElementById('karaoke-close').addEventListener('click', ()=>navigate(`/song/${song.id}`));
  playPauseBtn.addEventListener('click', ()=>{
    if(state.isPlaying && isCurrent()) player.pause();
    else if(isCurrent()) player.play();
    else player.loadSong(song,{autoplay:true});
  });
  document.getElementById('karaoke-restart').addEventListener('click', ()=>player.restart());
  seek.addEventListener('input', ()=>{ seeking=true; currentTimeEl.textContent=formatTime(Number(seek.value)); });
  seek.addEventListener('change', ()=>{ player.seek(Number(seek.value)); seeking=false; });
  volume.addEventListener('input', ()=>player.setVolume(Number(volume.value)));
  highlight(player.getCurrentTime());
  seek.value=String(player.getCurrentTime());
  currentTimeEl.textContent=formatTime(player.getCurrentTime());
  return ()=>{ unsubTime(); unsubState(); };
}

route('/', renderHome);
route('/search', renderSearch);
route('/song/:id', renderSongDetail);
route('/karaoke/:id', renderKaraoke);

// ---------- global play-button delegation ----------
document.addEventListener('click', e=>{
  const playBtn = e.target.closest('[data-play-song]');
  if(!playBtn) return;
  e.preventDefault(); e.stopPropagation();
  const song = findSong(playBtn.dataset.playSong);
  if(song) player.toggleSongPlayback(song);
});

// ---------- mini player wiring ----------
const miniPlayer=document.getElementById('mini-player');
const miniArt=document.getElementById('mini-player-art');
const miniArtLink=document.getElementById('mini-player-art-link');
const miniTitle=document.getElementById('mini-player-title');
const miniArtist=document.getElementById('mini-player-artist');
const miniPlayPause=document.getElementById('mini-playpause');
const miniRestart=document.getElementById('mini-restart');
const miniKaraoke=document.getElementById('mini-karaoke');
const miniSeek=document.getElementById('mini-seek');
const miniVolume=document.getElementById('mini-volume');
const miniCurrentTime=document.getElementById('mini-current-time');
const miniDuration=document.getElementById('mini-duration');
let miniSeeking=false;
function renderMiniPlayer(){
  const song=state.currentSong;
  if(!song){ miniPlayer.hidden=true; return; }
  miniPlayer.hidden=false;
  miniArt.src=song.cover; miniArt.alt='';
  miniArtLink.href=`#/song/${song.id}`;
  miniTitle.textContent=song.title;
  miniArtist.textContent=song.artist;
  miniPlayPause.textContent = state.isPlaying? '⏸':'▶';
  miniPlayPause.setAttribute('aria-label', state.isPlaying? 'Pause':'Play');
  miniSeek.max=String(song.durationSeconds||0);
}
subscribe(renderMiniPlayer);
miniPlayPause.addEventListener('click', ()=>{ if(!state.currentSong) return; if(state.isPlaying) player.pause(); else player.play(); });
miniRestart.addEventListener('click', ()=>player.restart());
miniKaraoke.addEventListener('click', ()=>{ if(state.currentSong) navigate(`/karaoke/${state.currentSong.id}`); });
miniSeek.addEventListener('input', ()=>{ miniSeeking=true; miniCurrentTime.textContent=formatTime(Number(miniSeek.value)); });
miniSeek.addEventListener('change', ()=>{ player.seek(Number(miniSeek.value)); miniSeeking=false; });
miniVolume.addEventListener('input', ()=>player.setVolume(Number(miniVolume.value)));
player.onTimeUpdate((t,duration)=>{
  if(!miniSeeking) miniSeek.value=String(t);
  miniCurrentTime.textContent=formatTime(t);
  if(isFinite(duration) && duration>0) miniDuration.textContent=formatTime(duration);
});

resolveRoute();
</script>
